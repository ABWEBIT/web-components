<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width">
<script>
(()=>{
  let mode = localStorage.getItem('data-color-mode');
  if(mode !== 'dark' && mode !== 'light'){
    mode = 'dark';
    localStorage.setItem('data-color-mode',mode);
  }
  document.documentElement.setAttribute('data-color-mode',mode);
})();
</script>
<link rel="stylesheet" href="./assets/styles.css">
<script type="module" src="./ui/lit-core.min.js"></script>

</head>

  <ui-app>

        <span class="version"></span>
      </div>
      <nav>
        <ul class="sidebar-list"></ul>
      </nav>
    </ui-sidebar>

    <ui-main>
      <header>
        <ui-color-mode></ui-color-mode>
      </header>
      <main>
        <article>

        </article>
      </main>
      <footer></footer>
    </ui-main>
  </ui-app>
  <ui-portal></ui-portal>
</ui-root>
<script type="module" src="./assets/app.js"></script>
<script type="module" src="./ui/components.js"></script>
</body>
</html>
