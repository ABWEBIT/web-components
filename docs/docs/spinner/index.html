<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width">
  <script>
    (()=>{
      let mode = localStorage.getItem('data-color-mode');
      if(mode !== 'dark' && mode !== 'light'){
        mode = 'dark';
        localStorage.setItem('data-color-mode',mode);
      }
      document.documentElement.setAttribute('data-color-mode',mode);
    })();
  </script>

  <link rel="stylesheet" href="/library/styles/reset/reset.css">
  <link rel="stylesheet" href="/library/styles/tokens/index.css">
  <link rel="stylesheet" href="/library/styles/core/index.css">

  <link rel="stylesheet" href="/library/styles/core.css">
  <link rel="stylesheet" href="/library/styles/template.css">
<!--<link rel="stylesheet" href="/library/styles/variants.css">-->
  <link rel="stylesheet" href="/library/styles/components.css">

  <script type="module" src="/library/lit-core.min.js"></script>
  <link rel="icon" href="data:,">

  <title>Spinner</title>
</head>
